<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Random Sempletone Picker</title>
    <link rel="icon" type="image/png" href="" id="favicon">

    <!-- Open Graph Meta Tags for Discord Embeds -->
    <meta property="og:title" content="Random Sempletone Picker" />
    <meta property="og:description" content="Random Color Picker from Sempletone's Library" />
    <meta property="og:image" content="https://frostgreatness.github.io/RandomSempletone/preview.png" />
    <meta property="og:url" content="https://frostgreatness.github.io/RandomSempletone/" />
    <meta property="og:type" content="website" />
    
    <!-- Branding Color for Discord Embed Side-Bar -->
    <meta name="theme-color" content="#D3B9FF" />
</head>
<body>

<div class="polaroid">
    <div class="image-placeholder"></div>
    <div class="caption-wrapper">
        <div id="color-name" class="name">COLOR NAME</div>
        <div class="hex-row">
            <div class="caption" id="hex-text">#HEXCODE</div>
            <button id="copy-btn">▶︎</button>
        </div>
    </div>
</div>

    <script src="color.js"></script>
</body>
</html>
